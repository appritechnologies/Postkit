networks:
  traefik:
    driver: bridge
    name: "{{projectName}}-backend_traefik"

services:
  traefik:
    image: traefik:v3.0
    container_name: "{{projectName}}-traefik"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    networks:
      - traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network={{projectName}}-backend_traefik
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --log.level=INFO
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"

  db:
    image: postgres:latest
    container_name: "{{projectName}}-db"
    restart: unless-stopped
    networks:
      - traefik
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "{{projectName}}_db"
      POSTGRES_USER: "{{dbUser}}"
      POSTGRES_PASSWORD: "{{dbPassword}}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{dbUser}} -d {{projectName}}_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: amacneil/dbmate:latest
    container_name: "{{projectName}}-migrate"
    networks:
      - traefik
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://{{dbUser}}:{{dbPassword}}@db:5432/{{projectName}}_db?sslmode=disable"
    volumes:
      - ./db/migrations/db/migrations:/db/migrations
    command: up
    restart: "no"

  rest:
    image: postgrest/postgrest:latest
    container_name: "{{projectName}}-rest"
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rest.rule=Host(`rest.localhost`)"
      - "traefik.http.routers.rest.entrypoints=web"
      - "traefik.http.services.rest.loadbalancer.server.port=3000"
    environment:
      PGRST_DB_URI: "postgres://{{dbUser}}:{{dbPassword}}@db:5432/{{projectName}}_db"
      PGRST_OPENAPI_SERVER_PROXY_URI: "http://localhost:3000"
      PGRST_DB_SCHEMA: "public"
      PGRST_DB_ANON_ROLE: "{{dbUser}}"
    depends_on:
      migrate:
        condition: service_completed_successfully

  swagger:
    image: swaggerapi/swagger-ui
    container_name: "{{projectName}}-swagger"
    restart: unless-stopped
    networks:
      - traefik
    environment:
      API_URL: "http://rest.localhost/"
    depends_on:
      - rest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.swagger.rule=Host(`swagger.localhost`)"
      - "traefik.http.routers.swagger.entrypoints=web"
      - "traefik.http.services.swagger.loadbalancer.server.port=8080"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: "{{projectName}}-keycloak"
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.localhost`)"
      - "traefik.http.routers.keycloak.entrypoints=web"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    environment:
      KEYCLOAK_ADMIN: "{{keycloakAdmin}}"
      KEYCLOAK_ADMIN_PASSWORD: "{{keycloakAdminPassword}}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://db:5432/{{projectName}}_db"
      KC_DB_USERNAME: "{{dbUser}}"
      KC_DB_PASSWORD: "{{dbPassword}}"
      KC_HOSTNAME: auth.localhost
      KC_HOSTNAME_ADMIN: auth.localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_FEATURES: docker,scripts
      PROXY_ADDRESS_FORWARDING: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_DB_SCHEMA: auth
      KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_LEGACY_LOGOUT_REDIRECT_URI: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./services/auth/providers/out:/opt/keycloak/providers
    depends_on:
      db:
        condition: service_healthy
    command: start-dev
    healthcheck:
      test: ['CMD-SHELL', '[ -f /tmp/HealthCheck.java ] || echo "public class HealthCheck { public static void main(String[] args) throws java.lang.Throwable { System.exit(java.net.HttpURLConnection.HTTP_OK == ((java.net.HttpURLConnection)new java.net.URL(args[0]).openConnection()).getResponseCode() ? 0 : 1); } }" > /tmp/HealthCheck.java && java /tmp/HealthCheck.java http://localhost:8080/health/live']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:6.4.0-24
    container_name: "{{projectName}}-keycloak-config"
    restart: on-failure
    networks:
      - traefik
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_USER: "{{keycloakAdmin}}"
      KEYCLOAK_PASSWORD: "{{keycloakAdminPassword}}"
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: true
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: 120s
      IMPORT_FILES: /config/realm.json
    volumes:
      - ./services/auth/config/realm.json:/config/realm.json
    depends_on:
      - keycloak

  # Worker service (conditionally included)
  worker:
    build: 
      context: ./services/worker-service
      target: production
    container_name: "{{projectName}}-worker"
    restart: unless-stopped
    networks:
      - traefik
    environment:
      NODE_ENV: "{{nodeEnv}}"
      DATABASE_URL: "postgres://{{dbUser}}:{{dbPassword}}@db:5432/{{projectName}}_db?sslmode=disable"
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./services/worker-service/build:/worker/build:ro
      - ./services/worker-service/graphile.config.js:/worker/graphile.config.js:ro
    profiles:
      - worker

  # Functions Runtime service (conditionally included)
  functions:
    image: ghcr.io/appritechnologies/functions-runtime:latest
    container_name: "{{projectName}}-functions"
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.functions.rule=Host(`functions.localhost`)"
      - "traefik.http.routers.functions.entrypoints=web"
      - "traefik.http.services.functions.loadbalancer.server.port=9010"
    environment:
      PORT: 9010
      FUNCTIONS_DIR: "/functions"
      JWKS_URL: "http://keycloak:8080/realms/application/protocol/openid-connect/certs"
      JWT_ISSUER: "http://keycloak:8080/realms/application"
      NODE_ENV: "{{nodeEnv}}"
    volumes:
      - ./services/functions:/functions:ro
    depends_on:
      keycloak:
        condition: service_healthy
    profiles:
      - functions

  # Storage services (conditionally included)
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: "{{projectName}}-imgproxy"
    restart: unless-stopped
    networks:
      - traefik
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /var/lib/storage
      IMGPROXY_USE_ETAG: "true"
    volumes:
      - ./volumes/storage:/var/lib/storage:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.imgproxy.rule=Host(`imgproxy.localhost`)"
      - "traefik.http.routers.imgproxy.entrypoints=web"
      - "traefik.http.services.imgproxy.loadbalancer.server.port=5001"
    profiles:
      - storage

  post-storage-migrate:
    image: amacneil/dbmate:latest
    container_name: "{{projectName}}-storage-migrate"
    restart: "no"
    networks:
      - traefik
    depends_on:
      storage:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgres://{{dbUser}}:{{dbPassword}}@db:5432/{{projectName}}_db?sslmode=disable"
    volumes:
      - ./services/storage/migrations:/db/migrations
    command: up
    profiles:
      - storage

  storage:
    container_name: "{{projectName}}-storage"
    build:
      context: https://github.com/appritechnologies/PG-storage.git
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storage.rule=Host(`storage.localhost`)"
      - "traefik.http.routers.storage.entrypoints=web"
      - "traefik.http.services.storage.loadbalancer.server.port=5000"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,OPTIONS,PUT,POST,DELETE,PATCH"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolmaxage=86400"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=Accept,Authorization,Cache-Control,Content-Type,DNT,If-Modified-Since,Keep-Alive,Origin,User-Agent,X-Requested-With,X-Client-Info,apikey,x-client-info"
      - "traefik.http.middlewares.cors.headers.accesscontrolexposeheaders=*"
      - "traefik.http.routers.storage.middlewares=cors"
    volumes:
      - ./volumes/storage:/var/lib/storage:z
      - ./services/storage/PG-storage-wget-entrypoint.sh:/entrypoint-jwk.sh
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://storage:5000/status"
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      REALM_NAME: application
      ANON_KEY: "{{anonKey}}"
      SERVICE_KEY: "{{serviceRoleKey}}"
      AUTH_JWT_ALGORITHM: RS256
      STORAGE_URL_SIGNING_KEY: "{{storageSigningKey}}"
      POSTGREST_URL: "http://rest:3000"
      PGRST_JWT_SECRET: "{{jwtSecret}}"
      DATABASE_URL: "postgres://{{dbUser}}:{{dbPassword}}@db:5432/{{projectName}}_db?sslmode=disable"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    command: "sh -c 'apk add --no-cache jq && chmod +x /entrypoint-jwk.sh && /entrypoint-jwk.sh node dist/start/server.js'"
    profiles:
      - storage

volumes:
  pgdata:
  storage_data: