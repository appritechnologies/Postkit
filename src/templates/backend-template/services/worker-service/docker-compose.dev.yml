version: '3.8'

services:
  graphile-worker:
    build: 
      context: .
      target: builder
    container_name: graphile-worker-dev
    init: true
    tty: true
    stdin_open: true
    network_mode: host
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for live development
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./graphile.config.js:/app/graphile.config.js:ro
      # Mount build output directory (writable for watch mode)
      - ./build:/app/build
    working_dir: /app
    command: sh -c "npm run build:watch & sleep 5 && npx graphile-worker"
    restart: unless-stopped