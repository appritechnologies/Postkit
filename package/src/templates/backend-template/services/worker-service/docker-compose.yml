version: '3.8'

services:
  # Development service with volume mounts for live development
  graphile-worker-dev:
    build: 
      context: .
      target: builder
    container_name: graphile-worker-dev
    init: true
    tty: true
    stdin_open: true
    network_mode: host
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code for development
      - ./src:/app/src:ro
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./graphile.config.js:/app/graphile.config.js:ro
      # Mount build output for the worker
      - ./build:/app/build
    working_dir: /app
    command: sh -c "npm run build:watch & sleep 5 && npx graphile-worker"
    restart: unless-stopped
    profiles:
      - dev

  # Production service using the built image
  graphile-worker:
    build: 
      context: .
      target: production
    container_name: graphile-worker-service
    init: true
    tty: true
    stdin_open: true
    network_mode: host
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod

  # Default service (backwards compatibility)
  graphile-worker-legacy:
    build: 
      context: .
      target: production
    container_name: graphile-worker-legacy
    init: true
    tty: true
    stdin_open: true
    network_mode: host
    env_file:
      - .env
    volumes:
      # Mount built files (existing behavior)
      - ./build:/worker/build:ro
      - ./graphile.config.js:/worker/graphile.config.js:ro
    restart: unless-stopped